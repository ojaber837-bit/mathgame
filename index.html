    @keyframes fbFade{0%{opacity:1}100%{opacity:0}}

function toAr(n){ return String(n).replace(/[0-9]/g,function(d){ return '٠١٢٣٤٥٦٧٨٩'[+d]; }); }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function render(html){ document.getElementById('app').innerHTML = html; }
function dbSet(p,v){ if(!firebaseOK||!db) return Promise.resolve(); return db.ref(p).set(v).catch(function(e){console.warn(e);}); }
function dbUpd(p,v){ if(!firebaseOK||!db) return Promise.resolve(); return db.ref(p).update(v).catch(function(e){console.warn(e);}); }
// global variable to keep the player's DB key in this session
var playerKey = null;

function joinGame(){
  var inp = document.getElementById('nameInput');
  var raw = inp ? inp.value.trim() : '';
  if(!raw){ shakeEl('nameInput'); return; }
  if(!selectedAvatar){
    var w = document.getElementById('avWarn');
    if(w){ w.style.display='block'; shakeEl('avWarn'); }
    return;
  }

  playerName = raw;
  playerAvatar = selectedAvatar;

  if(!firebaseOK || !db){
    // offline fallback: continue locally
    curQ = 0; score = 0; showQuestion();
    return;
  }

  // create a unique player node
  var ref = db.ref('players').push();
  playerKey = ref.key;

  var payload = {
    name: playerName,
    avatar: playerAvatar,
    joinedAt: Date.now(),
    currentQuestion: 0,
    score: 0,
    finished: false,
    online: true,
    lastSeen: Date.now()
  };

  // set the record and configure onDisconnect to mark offline/lastSeen
  ref.set(payload).then(function(){
    // ensure onDisconnect updates online=false and records lastSeen
    try {
      ref.onDisconnect().update({ online: false, lastSeen: Date.now() });
    } catch(e){
      // some environments may not support onDisconnect; ignore safely
      console.warn('onDisconnect not available', e);
    }
    showLobby();
  }).catch(function(e){
    console.warn('joinGame set failed', e);
    // fallback to lobby view so user can continue locally
    showLobby();
  });
}

function spawnStars(){
  var w=document.getElementById('bgStars');
  var e=['✨','💜','🌸','⭐','🌟','💫','🎀','💕','🌷','🦋'];
  for(var i=0;i<16;i++){
    var el=document.createElement('div'); el.className='bg-star';
    el.textContent=e[i%e.length];
    el.style.cssText='left:'+Math.round(Math.random()*100)+'vw;font-size:'+(0.6+Math.random()*0.7).toFixed(2)+'rem;opacity:'+(0.2+Math.random()*0.2).toFixed(2)+';animation-duration:'+(11+Math.random()*14).toFixed(1)+'s;animation-delay:-'+(Math.random()*18).toFixed(1)+'s;';
    w.appendChild(el);

}
function confetti(){
  var l=document.getElementById('confettiLayer');
  var c=['#f48fb1','#ce93d8','#9fa8da','#80cbc4','#fff59d','#ffcc80'];
  for(var i=0;i<80;i++){
    var el=document.createElement('div');
    el.style.cssText='position:absolute;width:'+(5+Math.random()*8).toFixed(0)+'px;height:'+(5+Math.random()*8).toFixed(0)+'px;background:'+c[i%c.length]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';left:'+Math.round(Math.random()*100)+'%;top:-15px;animation:confettiFall '+(1.6+Math.random()*1.8).toFixed(2)+'s '+(Math.random()*.7).toFixed(2)+'s linear forwards;';
    l.appendChild(el);
  }
  setTimeout(function(){l.innerHTML='';},4000);
}
function showFeedback(ok){

  l.innerHTML='<div class="feedback-popup"><div class="feedback-bubble '+(ok?'fb-correct':'fb-wrong')+'">'+(ok?'أنتِ مبدعة! إجابة صحيحة ✨':'حظاً أوفر، حاولي مجدداً في السؤال القادم 🌸')+'</div></div>';
  setTimeout(function(){l.innerHTML='';},1500);

function shakeEl(id){

// joinGame — use push() to create a unique player record (prevents overwrites when names collide)
var playerKey = null;

function updateLobby(snap){
  var d = document.getElementById('lobbyList'), b = document.getElementById('onlineBadge');
  if(!d) return;
  var data = snap.val();
  if(!data || !Object.keys(data).length){
    d.innerHTML = '<p style="color:#9e9e9e;font-size:.85rem;text-align:center">لم تنضم طالبات بعد...</p>';
    if(b) b.textContent = '٠ متواجدات';
    return;
  }
  var ps = Object.values(data);
  if(b) b.textContent = toAr(ps.length) + ' متواجدة';
  var h = '';
  ps.forEach(function(p){
    var isOnline = !!p.online;
    h += '<div class="lobby-card">'+
           avSvg(p.avatar||'star',28)+
           '<span style="font-weight:700;color:#37474f;font-size:.9rem">'+escH(p.name)+'</span>'+
           (isOnline
             ? '<span style="margin-right:auto;font-size:.72rem;padding:.15rem .6rem;border-radius:9999px;background:#e8f5e9;color:#2e7d32;font-weight:700">● متصلة</span>'
             : '<span style="margin-right:auto;font-size:.72rem;padding:.15rem .6rem;border-radius:9999px;background:#f3e5f5;color:#9e9e9e;font-weight:700">● غير متصلة</span>'
           ) +
         '</div>';
  });
  d.innerHTML = h;
}
  // create a unique player node with push(), store the key locally
  var ref = db.ref('players').push();
  playerKey = ref.key;
  var payload = { name: playerName, avatar: playerAvatar, joinedAt: Date.now(), currentQuestion:0, score:0, finished:false, key: playerKey };
  ref.set(payload).then(function(){
    showLobby();
  }).catch(function(e){
    console.warn('joinGame:', e);
    // fallback
    showLobby();
  });
}

  var letters=['أ','ب','ج','د'];
  var cH='';

      '</div>'+
      '<div class="glass rounded-xl p-1 mb-2 overflow-hidden shadow" id="timerWrap">'+
        '<div id="timerBar" class="timer-bar-inner h-3 rounded-lg" style="width:100%;background:linear-gradient(90deg,#f48fb1,#ce93d8)"></div>'+
      '</div>'+
      '<div style="text-align:center;margin-bottom:.75rem">'+
        '<span id="timerNum" class="text-2xl font-black text-pink-600">'+toAr(Q_SECS)+'</span>'+
        '<span class="text-gray-400 text-sm"> ثانية</span>'+
      '</div>'+
      '<div class="glass rounded-3xl p-6 mb-5 shadow-xl" style="text-align:center">'+
        '<div class="text-5xl mb-3 float inline-block">'+q.icon+'</div>'+
        '<p class="text-xl font-black text-gray-700 leading-relaxed">'+q.text+'</p>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem" id="choicesGrid">'+cH+'</div>'+
    '</div>'
  );
  startTimer();

function startTimer(){
  timerInt=setInterval(function(){
    timerVal--;
    var n=document.getElementById('timerNum'),b=document.getElementById('timerBar'),w=document.getElementById('timerWrap');
    if(n) n.textContent=toAr(timerVal);
    if(b) b.style.width=(timerVal/Q_SECS*100)+'%';
    if(w&&timerVal<=8) w.classList.add('timer-warn');
    if(timerVal<=0){clearTimer();if(!answered)timeUp();}
  },1000);
}

function selectAnswer(idx){
  if(answered) return;
  answered=true; clearTimer();
  var ok=(idx===QUESTIONS[curQ].correct);
  if(ok){score+=10;confetti();}
  showFeedback(ok);
  for(var i=0;i<4;i++){
    var b=document.getElementById('ch-'+i); if(!b) continue;
    b.disabled=true;
    if(i===QUESTIONS[curQ].correct) b.classList.add('correct-ans');
    else if(i===idx&&!ok) b.classList.add('wrong-ans');
  }
  if(!ok){var wb=document.getElementById('ch-'+idx);if(wb){wb.classList.add('shake');setTimeout(function(){wb.classList.remove('shake');},400);}}
  var key=sanitizeKey(playerName);
  dbUpd('players/'+key,{currentQuestion:curQ+1,score:score});
  setTimeout(nextQ,1700);
}
function timeUp(){
  for(var i=0;i<4;i++){var b=document.getElementById('ch-'+i);if(b){b.disabled=true;if(i===QUESTIONS[curQ].correct)b.classList.add('correct-ans');}}
  showFeedback(false);
  var key=sanitizeKey(playerName);
  dbUpd('players/'+key,{currentQuestion:curQ+1,score:score});
  setTimeout(nextQ,1700);
}
function nextQ(){curQ++;if(curQ>=QUESTIONS.length)showResults();else showQuestion();}

   RESULTS
══════════════════════════════════════ */
function showResults(){
  var key=sanitizeKey(playerName);
  dbUpd('players/'+key,{finished:true,score:score});
  confetti();
  var tot=QUESTIONS.length;
  var pct=Math.round(score/(tot*10)*100);
  var stars=pct>=80?3:pct>=50?2:1;
  var msg=pct===100?'ممتازة! أحسنتِ 🎉':pct>=80?'رائعة! عمل جميل 🌸':pct>=50?'جيّدة! استمري 💪':'حاولي مجدداً 😊';
  var sH=''; for(var i=0;i<3;i++) sH+='<span class="score-star" style="animation-delay:'+(i*.3)+'s">'+(i<stars?'⭐':'🌟')+'</span>';
  render(
    '<div class="w-full max-w-sm text-center bounce-in px-2">'+
      '<div class="glass rounded-3xl p-9 shadow-2xl">'+
        '<div style="display:flex;justify-content:center;gap:.5rem;margin-bottom:.75rem;font-size:2.8rem">'+sH+'</div>'+
        '<div style="display:flex;justify-content:center;margin-bottom:.75rem">'+avSvg(playerAvatar,54)+'</div>'+
        '<h2 class="text-2xl font-black text-purple-600 mb-1">انتهى الاختبار!</h2>'+
        '<p class="text-gray-500 mb-5 font-medium">'+msg+'</p>'+
        '<div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:8rem;height:8rem;margin-bottom:1.25rem">'+
          '<svg style="position:absolute;inset:0" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">'+
            '<circle cx="18" cy="18" r="15.9" fill="none" stroke="#fce4ec" stroke-width="3"/>'+
            '<circle cx="18" cy="18" r="15.9" fill="none" stroke="url(#sg)" stroke-width="3" stroke-dasharray="'+pct+', 100" stroke-linecap="round" transform="rotate(-90 18 18)"/>'+
            '<defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f48fb1"/><stop offset="100%" stop-color="#ce93d8"/></linearGradient></defs>'+
          '</svg>'+
          '<div><div class="text-3xl font-black text-pink-600">'+toAr(score)+'</div><div class="text-xs text-gray-400 font-bold">نقطة</div></div>'+
        '</div>'+
        '<p class="text-sm text-gray-400 mb-6">أصبتِ '+toAr(Math.round(score/10))+' من '+toAr(tot)+' أسئلة</p>'+
        '<button onclick="restart()" class="btn-lav w-full py-3 text-white font-black rounded-2xl shadow-lg text-lg">العب مرة أخرى 🔄</button>'+
      '</div>'+
    '</div>'
  );
}

function showTeacher(){
  // لا ننادي dbOff() هنا لتبقى المستمعات متصلة
  teacherTab='students';
  renderTeacher();

  /* مستمع لحالة اللعبة */
  dbOn('gameState','value', function(snap){
    var s = snap.val() || 'waiting';
    var badge = document.getElementById('statusBadge'), btn = document.getElementById('btnStart');
    if(!badge) return;
    if(s === 'active'){
      badge.textContent = '▶ اللعبة جارية'; badge.style.background = 'linear-gradient(135deg,#66bb6a,#43a047)';
      if(btn){ btn.textContent='⏹ أوقف'; btn.onclick = tStop; }
    } else if(s === 'finished'){
      badge.textContent = '✅ انتهت'; badge.style.background = 'linear-gradient(135deg,#9fa8da,#7986cb)';
      if(btn){ btn.textContent='▶ ابدأ مجدداً'; btn.onclick = tStart; }
    } else {
      badge.textContent = '⏸ في الانتظار'; badge.style.background = 'linear-gradient(135deg,#f48fb1,#ce93d8)';
      if(btn){ btn.textContent='▶ ابدأ اللعبة'; btn.onclick = tStart; }
    }
  });

  /* مستمع لقائمة اللاعبات لتحديث اللوحة مباشرة */
  dbOn('players','value', function(snap){
    updateLobby(snap);
    updateStudentTable(snap);
  });

      '</div>'+
    '</div>'
  );
}

function updateLobby(snap){
  var d=document.getElementById('lobbyList'), b=document.getElementById('onlineBadge');
  if(!d) return;
  var data=snap.val();
  if(!data||!Object.keys(data).length){
    d.innerHTML = '<p style="color:#9e9e9e;font-size:.85rem;text-align:center">لم تنضم طالبات بعد...</p>';
    if(b) b.textContent='٠ متواجدات';
    return;
  }
  var ps=Object.values(data);
  if(b) b.textContent = toAr(ps.length) + ' متواجدة';
  var h='';
  ps.forEach(function(p){
    var isOnline = !!p.online;
    h += '<div class="lobby-card">'+avSvg(p.avatar||'star',28)+
         '<span style="font-weight:700;color:#37474f;font-size:.9rem">'+escH(p.name)+'</span>'+
         (isOnline
           ? '<span style="margin-right:auto;font-size:.72rem;padding:.15rem .6rem;border-radius:9999px;background:#e8f5e9;color:#2e7d32;font-weight:700">● متصلة</span>'
           : '<span style="margin-right:auto;font-size:.72rem;padding:.15rem .6rem;border-radius:9999px;background:#f3e5f5;color:#9e9e9e;font-weight:700">● غير متصلة</span>'
         )+
         '</div>';
  });
  d.innerHTML = h;
}

function updateStudentTable(snap){
  var tbody=document.getElementById('studentsBody'), badge=document.getElementById('countBadge');
  if(!tbody) return;
  var data=snap.val();
  if(!data||!Object.keys(data).length){
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9e9e9e;padding:2rem;font-size:.88rem">لم تنضم طالبات بعد...</td></tr>';
    if(badge) badge.textContent='٠ طالبات';
    return;
  }
  var ps=Object.values(data).sort(function(a,b){ return (b.score||0)-(a.score||0); });
  if(badge) badge.textContent = toAr(ps.length) + ' طالبة';
  var tot=QUESTIONS.length, rows='';
  ps.forEach(function(p,i){
    var cq=Math.min(p.currentQuestion||0,tot), pct=Math.round(cq/tot*100);
    var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    var statusHtml;
    if(p.finished){
      statusHtml = '<span style="color:#2e7d32;font-weight:900;font-size:.78rem">✅ أنهت</span>';
    } else if(p.online){
      statusHtml = '<span style="color:#2e7d32;font-weight:900;font-size:.78rem">● متصلة</span>';
    } else if(cq===0){
      statusHtml = '<span style="color:#9e9e9e;font-size:.78rem">⏳ تنتظر</span>';
    } else {
      statusHtml = '<span style="color:#c2185b;font-weight:900;font-size:.78rem">🎮 تلعب</span>';
    }

    rows += '<tr class="t-row">'+
      '<td style="font-weight:900;color:#37474f">'+medal+' '+escH(p.name)+'</td>'+
      '<td style="text-align:center">'+
        '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">'+
          avSvg(p.avatar||'star',26)+
          '<span style="font-size:.6rem;color:#7b1fa2;font-weight:700">'+avLabel(p.avatar||'star')+'</span>'+
        '</div>'+
      '</td>'+
      '<td style="text-align:center;font-weight:700;color:#6a1b9a">'+toAr(cq)+' / '+toAr(tot)+'</td>'+
      '<td style="text-align:center;font-weight:900;color:#c2185b">'+toAr(p.score||0)+' ⭐</td>'+
      '<td style="min-width:7rem">'+
        '<div style="background:#fce4ec;border-radius:9999px;overflow:hidden;height:7px"><div class="s-bar" style="width:'+pct+'%"></div></div>'+
        '<div style="font-size:.68rem;color:#9e9e9e;text-align:center;margin-top:2px">'+toAr(pct)+'٪</div>'+
      '</td>'+
      '<td style="text-align:center">'+statusHtml+'</td>'+
    '</tr>';
  });
  tbody.innerHTML = rows;
}

/* ── Questions tab ── */
function buildQuestionsTab(){
  var h='<div>';
  QUESTIONS.forEach(function(q,i){
    var isOpen=(expandedQ===i);
    var cH='';
    q.choices.forEach(function(c,ci){
      var ok=(ci===q.correct);
      cH+='<span class="ans-chip '+(ok?'correct':'wrong')+'">'+
        (ok?'✓ ':'')+c+
      '</span>';
    });
    h+='<div class="q-row'+(isOpen?' expanded':'')+'" onclick="toggleQ('+i+')">'+
      '<div style="display:flex;align-items:center;gap:.75rem">'+
        '<span style="font-size:1.4rem">'+q.icon+'</span>'+
        '<div style="flex:1">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem">'+
            '<span style="font-weight:800;color:#4a148c;font-size:.92rem">'+toAr(i+1)+'. '+escH(q.text)+'</span>'+
            '<div style="display:flex;gap:.4rem">'+
              '<button onclick="event.stopPropagation();editQuestion('+i+')" style="background:linear-gradient(135deg,#ce93d8,#9fa8da);color:#fff;border:none;border-radius:10px;padding:.3rem .7rem;font-size:.75rem;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">✏️ تعديل</button>'+
              '<button onclick="event.stopPropagation();deleteQuestion('+i+')" style="background:linear-gradient(135deg,#ef9a9a,#e57373);color:#fff;border:none;border-radius:10px;padding:.3rem .7rem;font-size:.75rem;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">🗑</button>'+
            '</div>'+
          '</div>'+
          (isOpen?'<div style="margin-top:.6rem;display:flex;flex-wrap:wrap">'+cH+'</div>':'<div style="margin-top:.3rem"><span class="ans-chip correct">الإجابة: '+escH(q.choices[q.correct])+'</span></div>')+
        '</div>'+
      '</div>'+
    '</div>';
  });
  h+='<button onclick="addQuestion()" class="btn-green w-full py-3 text-white font-black rounded-2xl shadow mt-3 text-base" style="border:none;cursor:pointer">➕ إضافة سؤال جديد</button>';
  h+='</div>';
  return h;
}

function toggleQ(i){
  expandedQ=(expandedQ===i?-1:i);
  renderTabContent();
}

/* ── Settings tab ── */
function buildSettingsTab(){
  return (
    '<div class="glass rounded-3xl p-6 shadow-xl">'+
      '<h3 class="font-black text-purple-700 text-lg mb-4">⚙️ إعدادات الدرس</h3>'+
      '<label style="display:block;font-weight:700;color:#6a1b9a;margin-bottom:.4rem;font-size:.9rem">عنوان الدرس</label>'+
      '<input id="titleInput" type="text" value="'+escH(LESSON_TITLE)+'" class="field" style="margin-bottom:1.25rem" />'+
      '<label style="display:block;font-weight:700;color:#6a1b9a;margin-bottom:.4rem;font-size:.9rem">مدة كل سؤال (ثانية)</label>'+
      '<input id="secsInput" type="number" min="10" max="120" value="'+Q_SECS+'" class="field" style="margin-bottom:1.5rem;width:10rem" />'+
      '<button onclick="saveSettings()" class="btn-pink py-3 px-8 text-white font-black rounded-2xl shadow text-base" style="border:none;cursor:pointer">💾 حفظ الإعدادات</button>'+
      '<div id="settingsSaved" style="display:none;color:#2e7d32;font-weight:700;margin-top:.75rem">✅ تم الحفظ!</div>'+
    '</div>'
  );
}

function saveSettings(){
  var t=document.getElementById('titleInput'), s=document.getElementById('secsInput');
  if(t&&t.value.trim()) LESSON_TITLE=t.value.trim();
  if(s&&+s.value>=10) Q_SECS=+s.value;
  var el=document.getElementById('lessonSubtitle');
  if(el) el.textContent=LESSON_TITLE+' — '+toAr(QUESTIONS.length)+' أسئلة';
  var ok=document.getElementById('settingsSaved');
  if(ok){ok.style.display='block';setTimeout(function(){ok.style.display='none';},2000);}
}

/* ── Question edit modal ── */
function openModal(html){
  document.getElementById('modalLayer').innerHTML='<div class="modal-bg" id="modalBg">'+html+'</div>';
}
function closeModal(){document.getElementById('modalLayer').innerHTML='';}

function editQuestion(i){
  var q=QUESTIONS[i];
  var choicesH='';
  for(var c=0;c<4;c++){
    choicesH+='<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem">'+
      '<input type="radio" name="correct" value="'+c+'"'+(q.correct===c?' checked':'')+' id="rad'+c+'" style="accent-color:#ce93d8;width:16px;height:16px">'+
      '<label for="rad'+c+'" style="font-size:.78rem;font-weight:700;color:#9c27b0;width:1.2rem">'+['أ','ب','ج','د'][c]+'</label>'+
      '<input type="text" id="ch'+c+'" value="'+escH(q.choices[c])+'" class="field" style="flex:1;padding:.45rem .7rem;font-size:.88rem" />'+
    '</div>';
  }
  openModal(
    '<div class="modal-box">'+
      '<h3 style="font-weight:900;color:#6a1b9a;font-size:1.1rem;margin-bottom:1rem">✏️ تعديل السؤال '+(i+1)+'</h3>'+
      '<label style="display:block;font-weight:700;color:#6a1b9a;margin-bottom:.35rem;font-size:.85rem">نص السؤال</label>'+
      '<textarea id="qText" class="field" style="width:100%;min-height:80px;resize:vertical;margin-bottom:1rem">'+escH(q.text)+'</textarea>'+
      '<label style="display:block;font-weight:700;color:#6a1b9a;margin-bottom:.35rem;font-size:.85rem">أيقونة السؤال</label>'+
      '<input id="qIcon" type="text" value="'+escH(q.icon)+'" class="field" style="width:6rem;margin-bottom:1rem;text-align:center;font-size:1.3rem" />'+
      '<label style="display:block;font-weight:700;color:#6a1b9a;margin-bottom:.5rem;font-size:.85rem">الخيارات (✅ ضعي علامة على الإجابة الصحيحة)</label>'+
      choicesH+
      '<div style="display:flex;gap:.75rem;margin-top:1.25rem">'+
        '<button onclick="saveQuestion('+i+')" class="btn-pink" style="flex:1;padding:.75rem;color:#fff;font-weight:900;border:none;border-radius:14px;cursor:pointer;font-family:Cairo,sans-serif">💾 حفظ</button>'+
        '<button onclick="closeModal()" class="btn-lav" style="flex:1;padding:.75rem;color:#fff;font-weight:900;border:none;border-radius:14px;cursor:pointer;font-family:Cairo,sans-serif">إلغاء</button>'+
      '</div>'+
    '</div>'
  );
}

function saveQuestion(i){
  var txt=document.getElementById('qText'), icon=document.getElementById('qIcon');
  var choices=[];
  for(var c=0;c<4;c++) choices.push((document.getElementById('ch'+c)||{}).value||'');
  var corr=0;
  for(var c=0;c<4;c++){var r=document.getElementById('rad'+c);if(r&&r.checked){corr=c;break;}}
  if(txt&&txt.value.trim()){
    QUESTIONS[i]={text:txt.value.trim(),choices:choices,correct:corr,icon:(icon&&icon.value.trim())||QUESTIONS[i].icon};
  }
  TOTAL_Q=QUESTIONS.length;
  closeModal(); expandedQ=-1; renderTabContent();
  var el=document.getElementById('lessonSubtitle');
  if(el) el.textContent=LESSON_TITLE+' — '+toAr(QUESTIONS.length)+' أسئلة';
}

function addQuestion(){
  QUESTIONS.push({text:'سؤال جديد',choices:['خيار أ','خيار ب','خيار ج','خيار د'],correct:0,icon:'❓'});
  TOTAL_Q=QUESTIONS.length;
  expandedQ=-1; renderTabContent();
  setTimeout(function(){editQuestion(QUESTIONS.length-1);},50);
}

function deleteQuestion(i){
  if(!confirm('هل تريدين حذف هذا السؤال؟')) return;
  QUESTIONS.splice(i,1); TOTAL_Q=QUESTIONS.length;
  if(expandedQ>=QUESTIONS.length) expandedQ=-1;
  renderTabContent();
  var el=document.getElementById('lessonSubtitle');
  if(el) el.textContent=LESSON_TITLE+' — '+toAr(QUESTIONS.length)+' أسئلة';
}

/* ── Teacher controls ── */
function tStart(){
  db.ref('gameState').set('active').then(function(){
    db.ref('players').get().then(function(snap){
      if(!snap.exists()) return;
      var u={};
      Object.keys(snap.val()).forEach(function(k){
        u['players/'+k+'/currentQuestion']=0;
        u['players/'+k+'/score']=0;
        u['players/'+k+'/finished']=false;
      });
      db.ref().update(u);
    });
  });
}
function tStop(){ db.ref('gameState').set('finished'); }
function tReset(){
  if(!confirm('هل تريدين إعادة تعيين كل شيء؟')) return;
  db.ref('gameState').set('waiting').then(function(){ db.ref('players').remove(); });
}
function toStudent(){ appMode='student'; dbOff(); showNameEntry(); }

spawnStars();
if(appMode==='teacher') showTeacher(); else showNameEntry();
