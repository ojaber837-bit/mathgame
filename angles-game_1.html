<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸 لعبة الزوايا التعليمية</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 45%, #e8eaf6 100%);
      min-height: 100vh; overflow-x: hidden;
    }
    .glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,0.95);
    }
    .btn-pink {
      background: linear-gradient(135deg, #f48fb1, #ce93d8);
      transition: transform .18s, box-shadow .18s;
    }
    .btn-pink:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 24px rgba(206,147,216,.4); }
    .btn-pink:active { transform: scale(.97); }
    .btn-pink:disabled { opacity: .45; cursor: not-allowed; }
    .btn-lavender {
      background: linear-gradient(135deg, #ce93d8, #9fa8da);
      transition: transform .18s, box-shadow .18s;
    }
    .btn-lavender:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 24px rgba(159,168,218,.4); }
    .btn-lavender:active { transform: scale(.97); }
    .btn-lavender:disabled { opacity: .45; cursor: not-allowed; }
    .choice-btn {
      background: rgba(255,255,255,0.9);
      border: 2px solid rgba(244,143,177,.3);
      transition: all .22s cubic-bezier(.34,1.56,.64,1);
      cursor: pointer; text-align: right; width: 100%;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #f48fb1;
      transform: scale(1.03) translateY(-2px);
      box-shadow: 0 6px 20px rgba(244,143,177,.35);
    }
    .choice-btn.correct-ans { background: linear-gradient(135deg,#a5d6a7,#c8e6c9); border-color: #66bb6a; color: #1b5e20; }
    .choice-btn.wrong-ans   { background: linear-gradient(135deg,#ef9a9a,#ffcdd2); border-color: #e57373; color: #b71c1c; }
    .choice-btn:disabled    { cursor: not-allowed; }
    .timer-bar-inner { transition: width 1s linear; }
    .timer-warn .timer-bar-inner { background: linear-gradient(90deg,#ffb74d,#ff7043) !important; }

    @keyframes floatY   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes bounceIn { 0%{transform:scale(.3);opacity:0} 55%{transform:scale(1.06)} 75%{transform:scale(.94)} 100%{transform:scale(1);opacity:1} }
    @keyframes shakeX   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes confettiFall { 0%{transform:translateY(-60px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
    @keyframes bgRise   { 0%{transform:translateY(110vh);opacity:0} 10%{opacity:.4} 90%{opacity:.4} 100%{transform:translateY(-5vh);opacity:0} }
    @keyframes dotBounce{ 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
    @keyframes ringPulse{ 0%{transform:scale(.85);opacity:.9} 100%{transform:scale(1.6);opacity:0} }
    @keyframes spinPulse{ 0%,100%{transform:scale(1) rotate(0deg);opacity:.7} 50%{transform:scale(1.35) rotate(180deg);opacity:1} }

    .float      { animation: floatY   3s ease-in-out infinite; }
    .bounce-in  { animation: bounceIn .5s ease-out both; }
    .shake      { animation: shakeX   .35s ease-in-out; }
    .fade-up    { animation: fadeUp   .4s ease-out both; }
    .dot-bounce span {
      display:inline-block; width:10px; height:10px; border-radius:50%;
      animation: dotBounce 1.4s ease-in-out infinite both;
    }
    .dot-bounce span:nth-child(2){ animation-delay:.16s; }
    .dot-bounce span:nth-child(3){ animation-delay:.32s; }
    .ring-pulse {
      position:absolute; inset:0; border-radius:50%;
      border: 3px solid rgba(244,143,177,.55);
      animation: ringPulse 1.8s ease-out infinite;
    }
    .bg-star {
      position:fixed; pointer-events:none; z-index:0;
      animation: bgRise linear infinite;
    }
    .score-star { display:inline-block; animation: spinPulse 2s ease-in-out infinite; }
    .score-star:nth-child(2){ animation-delay:.4s; }
    .score-star:nth-child(3){ animation-delay:.8s; }
    .t-head { background: linear-gradient(135deg,#f8bbd0,#e1bee7); color:#6a1b9a; font-weight:700; padding:.55rem .9rem; }
    .t-row td { padding:.5rem .9rem; border-bottom:1px solid rgba(244,143,177,.18); }
    .t-row:last-child td { border-bottom:none; }
    .t-row:hover td { background:rgba(252,228,236,.5); }
    .s-bar { background:linear-gradient(90deg,#f48fb1,#ce93d8); border-radius:9999px; height:7px; transition:width .5s ease; }
    .fb-warn {
      background: linear-gradient(135deg,#fff9c4,#fff3e0);
      border: 2px solid #ffcc02; border-radius: 16px;
      padding: .75rem 1rem; font-size: .8rem; color: #795548;
      font-weight: 600; line-height: 1.6;
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#fce4ec; }
    ::-webkit-scrollbar-thumb { background:#f48fb1; border-radius:4px; }
  </style>
</head>
<body class="min-h-screen">

<div id="bgStars" aria-hidden="true"></div>
<div id="app" class="relative z-10 min-h-screen flex items-center justify-center p-4"></div>
<div id="confettiLayer" aria-hidden="true"
     style="pointer-events:none;position:fixed;inset:0;z-index:999;overflow:hidden;"></div>

<script>
/* ================================================================
   🔑  ضعي مفاتيح Firebase هنا — استبدلي كل قيمة بمفاتيح مشروعك
================================================================ */
var firebaseConfig = {
  apiKey:            "YOUR_API_KEY_HERE",
  authDomain:        "YOUR_AUTH_DOMAIN_HERE",
  databaseURL:       "YOUR_DATABASE_URL_HERE",
  projectId:         "YOUR_PROJECT_ID_HERE",
  storageBucket:     "YOUR_STORAGE_BUCKET_HERE",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID_HERE",
  appId:             "YOUR_APP_ID_HERE"
};
/* ============================================================ */

/* ─── Safe Firebase init ───────────────────────────────────── */
var db = null, firebaseOK = false;
try {
  var isPlaceholder = Object.values(firebaseConfig).some(function(v){ return String(v).indexOf('YOUR_') === 0; });
  if (!isPlaceholder) {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    firebaseOK = true;
  }
} catch(e) {
  console.warn('Firebase init error:', e.message);
}

/* ─── Helpers ───────────────────────────────────────────────── */
function toAr(n){ return String(n).replace(/[0-9]/g, function(d){ return '٠١٢٣٤٥٦٧٨٩'[+d]; }); }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getApp(){ return document.getElementById('app'); }
function render(html){ getApp().innerHTML = html; }

/* ─── Questions ─────────────────────────────────────────────── */
var QUESTIONS = [
  { text:"كم عدد الزوايا الناتجة من تقاطع مستقيمَين؟",
    choices:["زاويتان فقط","ثلاث زوايا","أربع زوايا","ست زوايا"], correct:2, icon:"📐" },
  { text:"ما مجموع قياسَي الزاويتين المتكاملتَين؟",
    choices:["٩٠°","١٨٠°","٢٧٠°","٣٦٠°"], correct:1, icon:"📏" },
  { text:"الزاويتان المتقابلتان بالرأس تكونان دائماً:",
    choices:["متساويتان في القياس","مجموعهما ٩٠°","مجموعهما ١٨٠°","مختلفتان دائماً"], correct:0, icon:"🔷" },
  { text:"إذا كانت إحدى الزاويتين المتكاملتَين تساوي ٦٠°، فالزاوية الأخرى تساوي:",
    choices:["٦٠°","٩٠°","١٢٠°","١٨٠°"], correct:2, icon:"🔺" },
  { text:"إذا كانت زاوية = ٣٥°، فالزاوية المتقابلة لها بالرأس تساوي:",
    choices:["٣٥°","١٤٥°","٧٠°","٩٠°"], correct:0, icon:"⭐" },
  { text:"إذا كانت إحدى الزاويتين المتكاملتَين تساوي ٦٣°، فالزاوية الأخرى تساوي:",
    choices:["١٠٧°","١١٧°","١٢٧°","١٣٧°"], correct:1, icon:"🌟" },
  { text:"في الشكل: زاوية = ١١٨° وزاوية متقابلة لها = (٢ص + ٢٠)°. ما قيمة ص؟",
    choices:["٤٩","٤٠","٥٩","٣٠"], correct:0, icon:"💫" },
  { text:"قامت آلاء بقياس زاوية تقاطع قطع خشبية فوجدتها ٧٥°. ما الزاوية المتكاملة لها؟",
    choices:["٧٥°","٩٠°","١٠٥°","١٥°"], correct:2, icon:"✨" },
  { text:"إذا كانت إحدى الزاويتين المتكاملتَين تساوي ١١٠°، فالزاوية الأخرى تساوي:",
    choices:["٦٠°","٧٠°","٨٠°","٥٠°"], correct:1, icon:"🎯" },
  { text:"إذا كانت إحدى الزاويتين المتكاملتَين تساوي ١٣٥°، فالزاوية الأخرى تساوي:",
    choices:["٥٥°","٣٥°","٦٥°","٤٥°"], correct:3, icon:"🌸" }
];
var TOTAL_Q = QUESTIONS.length, Q_SECS = 30;

/* ─── State ─────────────────────────────────────────────────── */
var appMode = 'student', playerName = '', curQ = 0, score = 0;
var answered = false, timerVal = Q_SECS, timerInt = null;
var fbListeners = [], titleClicks = 0;

/* ─── Mode detection ────────────────────────────────────────── */
(function detectMode(){
  var p = new URLSearchParams(window.location.search);
  if (p.get('mode') === 'teacher' || window.location.hash === '#admin') appMode = 'teacher';
})();

/* ─── Background stars ──────────────────────────────────────── */
function spawnStars(){
  var wrap = document.getElementById('bgStars');
  var emojis = ['✨','💜','🌸','⭐','🌟','💫','🎀','💕','🌷','🦋'];
  for (var i = 0; i < 16; i++){
    var el = document.createElement('div');
    el.className = 'bg-star';
    el.textContent = emojis[i % emojis.length];
    el.style.cssText = 'left:'+Math.round(Math.random()*100)+'vw;font-size:'+(0.6+Math.random()*0.7).toFixed(2)+'rem;opacity:'+(0.2+Math.random()*0.2).toFixed(2)+';animation-duration:'+(11+Math.random()*14).toFixed(1)+'s;animation-delay:-'+(Math.random()*18).toFixed(1)+'s;';
    wrap.appendChild(el);
  }
}

/* ─── Confetti ──────────────────────────────────────────────── */
function confetti(){
  var layer = document.getElementById('confettiLayer');
  var colors = ['#f48fb1','#ce93d8','#9fa8da','#80cbc4','#fff59d','#ffcc80'];
  for (var i = 0; i < 80; i++){
    var el = document.createElement('div');
    el.style.cssText = 'position:absolute;width:'+(5+Math.random()*8).toFixed(0)+'px;height:'+(5+Math.random()*8).toFixed(0)+'px;background:'+colors[i%colors.length]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';left:'+Math.round(Math.random()*100)+'%;top:-15px;animation:confettiFall '+(1.6+Math.random()*1.8).toFixed(2)+'s '+(Math.random()*.7).toFixed(2)+'s linear forwards;';
    layer.appendChild(el);
  }
  setTimeout(function(){ layer.innerHTML = ''; }, 4000);
}

/* ─── Firebase wrappers ─────────────────────────────────────── */
function dbSet(path, val){ if (!firebaseOK || !db) return Promise.resolve(); return db.ref(path).set(val).catch(function(e){ console.warn('dbSet',e); }); }
function dbUpdate(path, val){ if (!firebaseOK || !db) return Promise.resolve(); return db.ref(path).update(val).catch(function(e){ console.warn('dbUpdate',e); }); }
function dbOn(path, evt, cb){
  if (!firebaseOK || !db) return;
  var ref = db.ref(path); ref.on(evt, cb);
  fbListeners.push({ref:ref, evt:evt, cb:cb});
}
function dbOff(){ fbListeners.forEach(function(l){ l.ref.off(l.evt, l.cb); }); fbListeners = []; }

function fbWarnBanner(){
  if (firebaseOK) return '';
  return '<div class="fb-warn mb-4 fade-up">⚠️ <strong>وضع تجريبي</strong> — اللعبة تعمل محلياً فقط.<br>أضيفي مفاتيح Firebase في <code>firebaseConfig</code> لتفعيل المزامنة المباشرة.</div>';
}

/* ─── Title click → teacher ─────────────────────────────────── */
function onTitleClick(){
  titleClicks++;
  if (titleClicks >= 5){ titleClicks=0; appMode='teacher'; clearTimer(); dbOff(); showTeacher(); }
}

/* ─── Shake ─────────────────────────────────────────────────── */
function shakeEl(id){
  var el = document.getElementById(id); if (!el) return;
  el.classList.add('shake');
  setTimeout(function(){ el.classList.remove('shake'); }, 400);
}

/* ══════════════════════════════════════════════════════════════
   STUDENT — Name Entry
══════════════════════════════════════════════════════════════ */
function showNameEntry(){
  dbOff(); clearTimer();
  render(
    '<div class="w-full max-w-md text-center bounce-in px-2">'+
      '<div class="mb-7 cursor-pointer select-none" onclick="onTitleClick()">'+
        '<div class="text-7xl mb-3 float inline-block">🌸</div>'+
        '<h1 class="text-3xl font-black text-pink-600">لعبة الزوايا</h1>'+
        '<p class="text-purple-500 font-semibold mt-1 text-sm">الزوايا الناتجة من تقاطع مستقيمَين</p>'+
      '</div>'+
      '<div class="glass rounded-3xl p-8 shadow-2xl">'+
        fbWarnBanner()+
        '<p class="text-gray-600 text-lg font-bold mb-5">✨ أدخلي اسمكِ للانضمام</p>'+
        '<input id="nameInput" type="text" maxlength="30" placeholder="اسمكِ هنا..." autocomplete="off"'+
          ' class="w-full text-center text-xl p-4 rounded-2xl border-2 border-pink-200 focus:border-pink-400 focus:outline-none bg-pink-50 mb-5 font-bold text-gray-700 placeholder-pink-200"'+
          ' onkeydown="if(event.key===\'Enter\') joinGame()" />'+
        '<button onclick="joinGame()" class="btn-pink w-full py-4 text-white text-xl font-black rounded-2xl shadow-lg">دخول إلى اللعبة 🎀</button>'+
      '</div>'+
      '<div class="mt-5 flex justify-center gap-4 text-3xl">'+
        '<span style="animation:spinPulse 2s .0s ease-in-out infinite;display:inline-block">💜</span>'+
        '<span style="animation:spinPulse 2s .5s ease-in-out infinite;display:inline-block">🌸</span>'+
        '<span style="animation:spinPulse 2s 1s ease-in-out infinite;display:inline-block">💜</span>'+
      '</div>'+
    '</div>'
  );
  setTimeout(function(){ var el=document.getElementById('nameInput'); if(el) el.focus(); }, 80);
}

/* ─── Join ──────────────────────────────────────────────────── */
function joinGame(){
  var inp = document.getElementById('nameInput');
  var raw = inp ? inp.value.trim() : '';
  if (!raw){ shakeEl('nameInput'); return; }
  playerName = raw;
  dbSet('players/'+playerName, {
    name:playerName, joinedAt:Date.now(), currentQuestion:0, score:0, finished:false
  }).then(function(){
    if (firebaseOK) showLobby();
    else { curQ=0; score=0; showQuestion(); }
  });
}

/* ─── Lobby ─────────────────────────────────────────────────── */
function showLobby(){
  render(
    '<div class="w-full max-w-sm text-center bounce-in px-2">'+
      '<div class="glass rounded-3xl p-10 shadow-2xl">'+
        '<div class="relative inline-block mb-6">'+
          '<div class="ring-pulse"></div>'+
          '<div class="text-7xl float inline-block">⏳</div>'+
        '</div>'+
        '<h2 class="text-2xl font-black text-purple-600 mb-2">بانتظار المعلمة...</h2>'+
        '<p class="text-gray-500 mb-1 text-base">مرحباً <span class="text-pink-500 font-black">'+escH(playerName)+'</span>! 🌸</p>'+
        '<p class="text-gray-400 text-sm mb-7">سيبدأ الاختبار عندما تضغط المعلمة على زر البدء</p>'+
        '<div class="dot-bounce flex justify-center gap-3">'+
          '<span class="bg-pink-400"></span><span class="bg-purple-400"></span><span class="bg-pink-400"></span>'+
        '</div>'+
        '<div id="lobbyCount" class="mt-5 text-xs text-gray-400 font-medium"></div>'+
      '</div>'+
    '</div>'
  );
  dbOn('game/status','value',function(snap){
    if (snap.val()==='active'){ dbOff(); curQ=0; score=0; showQuestion(); }
  });
  dbOn('players','value',function(snap){
    var el=document.getElementById('lobbyCount');
    if(el) el.textContent = toAr(snap.numChildren())+' طالبة في صالة الانتظار';
  });
}

/* ─── Question ──────────────────────────────────────────────── */
function showQuestion(){
  clearTimer(); answered=false; timerVal=Q_SECS;
  var q = QUESTIONS[curQ];
  var letters = ['أ','ب','ج','د'];
  var choicesHtml = '';
  for (var i=0; i<q.choices.length; i++){
    choicesHtml += '<button class="choice-btn rounded-2xl p-4 font-bold text-gray-700 text-base shadow-md" onclick="selectAnswer('+i+')" id="ch-'+i+'"><span class="text-pink-400 font-black ml-1">'+letters[i]+')</span> '+q.choices[i]+'</button>';
  }
  render(
    '<div class="w-full max-w-lg bounce-in px-1">'+
      '<div class="flex justify-between items-center mb-3 gap-2 flex-wrap">'+
        '<div class="glass rounded-full px-4 py-2 text-sm font-black text-purple-600 shadow">⭐ '+toAr(score)+' نقطة</div>'+
        '<div class="glass rounded-full px-4 py-2 text-sm font-black text-pink-600 shadow">سؤال '+toAr(curQ+1)+' / '+toAr(TOTAL_Q)+'</div>'+
      '</div>'+
      '<div class="glass rounded-xl p-1 mb-2 overflow-hidden shadow" id="timerWrap">'+
        '<div id="timerBar" class="timer-bar-inner h-3 rounded-lg" style="width:100%;background:linear-gradient(90deg,#f48fb1,#ce93d8)"></div>'+
      '</div>'+
      '<div class="text-center mb-4">'+
        '<span id="timerNum" class="text-2xl font-black text-pink-600">'+toAr(Q_SECS)+'</span>'+
        '<span class="text-gray-400 text-sm"> ثانية</span>'+
      '</div>'+
      '<div class="glass rounded-3xl p-6 mb-5 shadow-xl text-center">'+
        '<div class="text-5xl mb-3 float inline-block">'+q.icon+'</div>'+
        '<p class="text-xl font-black text-gray-700 leading-relaxed">'+q.text+'</p>'+
      '</div>'+
      '<div class="grid grid-cols-2 gap-3" id="choicesGrid">'+choicesHtml+'</div>'+
    '</div>'
  );
  startTimer();
}

/* ─── Timer ─────────────────────────────────────────────────── */
function startTimer(){
  timerInt = setInterval(function(){
    timerVal--;
    var num=document.getElementById('timerNum'), bar=document.getElementById('timerBar'), wrap=document.getElementById('timerWrap');
    if(num) num.textContent=toAr(timerVal);
    if(bar) bar.style.width=(timerVal/Q_SECS*100)+'%';
    if(wrap && timerVal<=8) wrap.classList.add('timer-warn');
    if(timerVal<=0){ clearTimer(); if(!answered) timeUp(); }
  },1000);
}
function clearTimer(){ if(timerInt){ clearInterval(timerInt); timerInt=null; } }

/* ─── Answer ────────────────────────────────────────────────── */
function selectAnswer(idx){
  if(answered) return;
  answered=true; clearTimer();
  var correct=(idx===QUESTIONS[curQ].correct);
  if(correct){ score+=10; confetti(); }
  for(var i=0;i<4;i++){
    var b=document.getElementById('ch-'+i); if(!b) continue;
    b.disabled=true;
    if(i===QUESTIONS[curQ].correct) b.classList.add('correct-ans');
    else if(i===idx && !correct) b.classList.add('wrong-ans');
  }
  if(!correct){
    var wb=document.getElementById('ch-'+idx);
    if(wb){ wb.classList.add('shake'); setTimeout(function(){ wb.classList.remove('shake'); },400); }
  }
  dbUpdate('players/'+playerName,{currentQuestion:curQ+1,score:score});
  setTimeout(nextQ,1200);
}
function timeUp(){
  for(var i=0;i<4;i++){
    var b=document.getElementById('ch-'+i); if(b){ b.disabled=true; if(i===QUESTIONS[curQ].correct) b.classList.add('correct-ans'); }
  }
  dbUpdate('players/'+playerName,{currentQuestion:curQ+1,score:score});
  setTimeout(nextQ,1200);
}
function nextQ(){ curQ++; if(curQ>=TOTAL_Q) showResults(); else showQuestion(); }

/* ─── Results ───────────────────────────────────────────────── */
function showResults(){
  dbUpdate('players/'+playerName,{finished:true,score:score});
  confetti();
  var pct=Math.round(score/(TOTAL_Q*10)*100);
  var stars=pct>=80?3:pct>=50?2:1;
  var msg=pct===100?'ممتازة! أحسنتِ 🎉':pct>=80?'رائعة! عمل جميل 🌸':pct>=50?'جيّدة! استمري 💪':'حاولي مجدداً 😊';
  var sH='';
  for(var i=0;i<3;i++) sH+='<span class="score-star" style="animation-delay:'+(i*.3)+'s">'+(i<stars?'⭐':'🌟')+'</span>';
  render(
    '<div class="w-full max-w-sm text-center bounce-in px-2">'+
      '<div class="glass rounded-3xl p-9 shadow-2xl">'+
        '<div class="text-5xl mb-4 flex justify-center gap-2">'+sH+'</div>'+
        '<h2 class="text-2xl font-black text-purple-600 mb-1">انتهى الاختبار!</h2>'+
        '<p class="text-gray-500 mb-6 font-medium">'+msg+'</p>'+
        '<div class="relative inline-flex items-center justify-center w-32 h-32 mb-6">'+
          '<svg class="absolute inset-0" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">'+
            '<circle cx="18" cy="18" r="15.9" fill="none" stroke="#fce4ec" stroke-width="3"/>'+
            '<circle cx="18" cy="18" r="15.9" fill="none" stroke="url(#sg)" stroke-width="3" stroke-dasharray="'+pct+', 100" stroke-linecap="round" transform="rotate(-90 18 18)"/>'+
            '<defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f48fb1"/><stop offset="100%" stop-color="#ce93d8"/></linearGradient></defs>'+
          '</svg>'+
          '<div><div class="text-3xl font-black text-pink-600">'+toAr(score)+'</div><div class="text-xs text-gray-400 font-bold">نقطة</div></div>'+
        '</div>'+
        '<p class="text-sm text-gray-400 mb-7">أصبتِ '+toAr(Math.round(score/10))+' من '+toAr(TOTAL_Q)+' أسئلة</p>'+
        '<button onclick="restart()" class="btn-lavender w-full py-3 text-white font-black rounded-2xl shadow-lg text-lg">العب مرة أخرى 🔄</button>'+
      '</div>'+
    '</div>'
  );
}
function restart(){ curQ=0; score=0; answered=false; showNameEntry(); }

/* ══════════════════════════════════════════════════════════════
   TEACHER DASHBOARD
══════════════════════════════════════════════════════════════ */
function showTeacher(){
  dbOff();
  var disAttr = firebaseOK ? '' : ' disabled';
  render(
    '<div class="w-full max-w-3xl bounce-in px-2">'+
      '<div class="glass rounded-3xl p-6 mb-4 shadow-xl">'+
        '<div class="flex items-center gap-4 flex-wrap">'+
          '<div class="text-5xl float">👩‍🏫</div>'+
          '<div class="flex-1 min-w-0">'+
            '<h1 class="text-2xl font-black text-purple-700">لوحة تحكّم المعلمة</h1>'+
            '<p class="text-pink-500 text-sm font-semibold">الزوايا الناتجة من تقاطع مستقيمَين — '+toAr(TOTAL_Q)+' أسئلة</p>'+
          '</div>'+
          '<div id="statusBadge" class="rounded-full px-4 py-2 text-sm font-black text-white shadow" style="background:linear-gradient(135deg,#f48fb1,#ce93d8)">⏸ في الانتظار</div>'+
        '</div>'+
      '</div>'+
      (!firebaseOK ? '<div class="fb-warn mb-4 fade-up">⚠️ <strong>Firebase غير متصل</strong> — لن يظهر أي طلاب حتى تضيفي المفاتيح الصحيحة في <code>firebaseConfig</code>.</div>' : '')+
      '<div class="grid grid-cols-2 gap-3 mb-4">'+
        '<button id="btnStart" onclick="tStart()" class="btn-pink py-4 text-white font-black rounded-2xl shadow-lg text-lg"'+disAttr+'>▶ ابدأ اللعبة</button>'+
        '<button onclick="tReset()" class="btn-lavender py-4 text-white font-black rounded-2xl shadow-lg text-lg"'+disAttr+'>🔄 إعادة تعيين</button>'+
      '</div>'+
      '<div class="glass rounded-3xl shadow-xl overflow-hidden">'+
        '<div class="p-4 border-b border-pink-100 flex justify-between items-center">'+
          '<h2 class="font-black text-purple-700 text-lg">📋 الطالبات المشاركات</h2>'+
          '<span id="countBadge" class="text-xs bg-pink-100 text-pink-600 font-black px-3 py-1 rounded-full">'+(firebaseOK?'تحميل...':'غير متصل')+'</span>'+
        '</div>'+
        '<div class="overflow-x-auto">'+
          '<table class="w-full text-right" style="border-collapse:collapse">'+
            '<thead><tr>'+
              '<th class="t-head">الاسم</th><th class="t-head">السؤال</th><th class="t-head">النقاط</th><th class="t-head">التقدّم</th><th class="t-head">الحالة</th>'+
            '</tr></thead>'+
            '<tbody id="studentsBody">'+
              '<tr><td colspan="5" class="text-center text-gray-400 py-8 text-sm">'+(firebaseOK?'لم تنضم طالبات بعد...':'أضيفي مفاتيح Firebase لرؤية الطالبات')+'</td></tr>'+
            '</tbody>'+
          '</table>'+
        '</div>'+
      '</div>'+
      '<p class="text-center mt-4"><button onclick="toStudent()" class="text-xs text-gray-400 hover:text-pink-500 transition-colors underline">دخول كطالبة</button></p>'+
    '</div>'
  );
  if(firebaseOK){ listenStatus(); listenPlayers(); }
}

function toStudent(){ appMode='student'; dbOff(); showNameEntry(); }

function listenStatus(){
  dbOn('game/status','value',function(snap){
    var s=snap.val()||'waiting';
    var badge=document.getElementById('statusBadge'), btn=document.getElementById('btnStart');
    if(!badge) return;
    if(s==='active'){
      badge.textContent='▶ اللعبة جارية';
      badge.style.background='linear-gradient(135deg,#66bb6a,#43a047)';
      if(btn){ btn.textContent='⏹ أوقف'; btn.onclick=tStop; }
    } else if(s==='finished'){
      badge.textContent='✅ انتهت اللعبة';
      badge.style.background='linear-gradient(135deg,#9fa8da,#7986cb)';
      if(btn){ btn.textContent='▶ ابدأ مجدداً'; btn.onclick=tStart; }
    } else {
      badge.textContent='⏸ في الانتظار';
      badge.style.background='linear-gradient(135deg,#f48fb1,#ce93d8)';
      if(btn){ btn.textContent='▶ ابدأ اللعبة'; btn.onclick=tStart; }
    }
  });
}

function listenPlayers(){
  dbOn('players','value',function(snap){
    var tbody=document.getElementById('studentsBody'), badge=document.getElementById('countBadge');
    if(!tbody) return;
    var data=snap.val();
    if(!data||!Object.keys(data).length){
      tbody.innerHTML='<tr><td colspan="5" class="text-center text-gray-400 py-8 text-sm">لم تنضم طالبات بعد...</td></tr>';
      if(badge) badge.textContent='٠ طالبات'; return;
    }
    var players=Object.values(data).sort(function(a,b){
      if(a.finished&&!b.finished) return 1; if(!a.finished&&b.finished) return -1;
      return (b.currentQuestion||0)-(a.currentQuestion||0);
    });
    if(badge) badge.textContent=toAr(players.length)+' طالبة';
    var rows='';
    players.forEach(function(p){
      var cq=Math.min(p.currentQuestion||0,TOTAL_Q), pct=Math.round(cq/TOTAL_Q*100);
      var st=p.finished
        ? '<span class="text-green-600 font-black text-xs">✅ أنهت</span>'
        : cq===0
          ? '<span class="text-gray-400 text-xs">⏳ تنتظر</span>'
          : '<span class="text-pink-600 font-black text-xs">🎮 تلعب</span>';
      rows+='<tr class="t-row">'+
        '<td class="font-black text-gray-700">'+escH(p.name)+'</td>'+
        '<td class="text-center font-bold text-purple-600">'+toAr(cq)+'/'+toAr(TOTAL_Q)+'</td>'+
        '<td class="text-center font-black text-pink-600">'+toAr(p.score||0)+' ⭐</td>'+
        '<td class="min-w-28"><div class="bg-pink-50 rounded-full overflow-hidden" style="height:7px"><div class="s-bar" style="width:'+pct+'%"></div></div><div class="text-xs text-gray-400 text-center mt-1">'+toAr(pct)+'٪</div></td>'+
        '<td class="text-center">'+st+'</td>'+
      '</tr>';
    });
    tbody.innerHTML=rows;
  });
}

function tStart(){
  dbSet('game',{status:'active',startedAt:Date.now()}).then(function(){
    db.ref('players').get().then(function(snap){
      if(snap.exists()){
        var u={};
        Object.keys(snap.val()).forEach(function(n){
          u['players/'+n+'/currentQuestion']=0;
          u['players/'+n+'/score']=0;
          u['players/'+n+'/finished']=false;
        });
        db.ref().update(u);
      }
    });
  });
}
function tStop(){ dbSet('game/status','finished'); }
function tReset(){
  if(!confirm('هل تريدين إعادة تعيين كل شيء؟')) return;
  dbSet('game',{status:'waiting'}).then(function(){ if(db) db.ref('players').remove(); });
}

/* ─── Init ──────────────────────────────────────────────────── */
spawnStars();
if(appMode==='teacher') showTeacher(); else showNameEntry();
</script>
